# ──────────────────────────────────────────────
# tmux.conf — ~/.config/tmux/tmux.conf
# ──────────────────────────────────────────────
# Designed for Ghostty + agentic coding (Claude Code, Amp, Codex)

# ─── Prefix ──────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── General ─────────────────────────────────
set -g default-terminal "xterm-ghostty"
set -ga terminal-overrides ",xterm-ghostty:Tc"    # True color
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on
set -sg escape-time 0
set -g display-time 2000

# ─── Extended keys for Claude Code ───────────
# Fixes Shift+Enter, Ctrl+Enter in agent TUIs
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'

# ─── Vi mode ─────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ─── Splits & Navigation ────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-tmux-navigator — seamless Ctrl+hjkl across tmux/nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Prefix-based pane navigation (fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Session management ─────────────────────
# Quick session switching
bind s choose-tree -sZ
bind S command-prompt -p "new session:" "new-session -s '%%'"

# Kill session without leaving tmux
bind X confirm-before -p "kill session #S? (y/n)" kill-session

# ─── Agent windows ───────────────────────────
# Quick-launch agent in a new window
bind C-c new-window -n "claude" "claude"
bind C-a new-window -n "amp" "amp"
bind C-x new-window -n "codex" "codex"


# ─── Workstream shader sync ─────────────────
# Sync Ghostty background shader when switching tabs or sessions.
# focus-in applies the correct shader; focus-out resets after a delay
# (delay ensures focus-in on the new tab wins if switching between tmux tabs).
set-hook -g client-focus-in "run-shell -b '$HOME/bin/ws shader-sync'"
set-hook -g client-session-changed "run-shell -b '$HOME/bin/ws shader-sync'"
set-hook -g client-focus-out "run-shell -b '$HOME/bin/ws shader-sync'"

# ─── Reload ──────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Status bar ──────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-justify left

# ─── Catppuccin Mocha colors ────────────────
# Base
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "

# Right: git branch + time
set -g status-right-length 80
set -g status-right "#[fg=#6c7086]│ #[fg=#a6adc8]%H:%M #[fg=#6c7086]│ #[fg=#a6adc8]%b %d "

# Window tabs
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message bar
set -g message-style "bg=#313244,fg=#cdd6f4"

# ─── Plugins (via TPM) ──────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'

# Resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum — auto-save every 10 minutes
set -g @continuum-save-interval '10'

# ─── TPM bootstrap ──────────────────────────
# Install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/bin/install_plugins'
run '~/.tmux/plugins/tpm/tpm'
